name: Dryft Feature Drift

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

jobs:
  dryft:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Dryft
        uses: dijla-ventures/dryft-action@v1.0.0
        with:
          format: sarif
          output: dryft.sarif

      - name: Upload Dryft SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: dryft.sarif